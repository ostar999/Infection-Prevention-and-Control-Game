<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏥 传染病防护知识培训游戏</title>
<style>
/* ============================================================
   THEME SYSTEM
   ============================================================ */
:root {
  --bg-gradient: linear-gradient(135deg, #e8f0fe 0%, #d2e3fc 50%, #e8f0fe 100%);
  --header-bg: linear-gradient(135deg, #1a73e8, #0d47a1);
  --header-shadow: rgba(26,115,232,0.3);
  --accent: #1a73e8;
  --accent-dark: #0d47a1;
  --accent-hover: #1557b0;
  --accent-light: #e8f0fe;
  --accent-lighter: #d2e3fc;
  --accent-shadow: rgba(26,115,232,0.2);
  --card-bg: #ffffff;
  --surface-bg: #fafafa;
  --surface-alt: #f8f9fa;
  --text: #1a1a2e;
  --text-secondary: #5f6368;
  --border: #dadce0;
  --shadow: rgba(0,0,0,0.06);
  --success: #0d904f;
  --success-light: #ceead6;
  --success-dark: #0a7a3f;
  --success-shadow: rgba(13,144,79,0.2);
  --error: #d93025;
  --error-light: #fce8e6;
  --error-dark: #b3261e;
  --error-shadow: rgba(217,48,37,0.2);
  --warning: #f9ab00;
  --warning-light: #fef7e0;
  --warning-dark: #e37400;
  --warning-shadow: rgba(249,171,0,0.2);
  --btn-primary-shadow: rgba(26,115,232,0.3);
  --btn-success-shadow: rgba(13,144,79,0.3);
  --tab-hover: #e8f0fe;
  --sidebar-width: 260px;
}
.theme-warm {
  --bg-gradient: linear-gradient(135deg, #fdf8f0 0%, #f5e6d0 50%, #fdf8f0 100%);
  --header-bg: linear-gradient(135deg, #8B6914, #6B4F12);
  --header-shadow: rgba(139,105,20,0.3);
  --accent: #8B6914; --accent-dark: #6B4F12; --accent-hover: #7A5C10;
  --accent-light: #fdf6ed; --accent-lighter: #f5e6d0; --accent-shadow: rgba(139,105,20,0.2);
  --card-bg: #fffefb; --surface-bg: #faf7f2; --surface-alt: #f8f4ed;
  --text: #2c2416; --text-secondary: #8c7a5c; --border: #e0d5c0; --shadow: rgba(0,0,0,0.06);
  --success: #5c8a4a; --success-light: #e8f0e0; --success-dark: #4a7038; --success-shadow: rgba(92,138,74,0.2);
  --error: #c1554b; --error-light: #fae8e5; --error-dark: #a04038; --error-shadow: rgba(193,85,75,0.2);
  --warning: #c49b38; --warning-light: #fdf5e6; --warning-dark: #b8860b; --warning-shadow: rgba(196,155,56,0.2);
  --btn-primary-shadow: rgba(139,105,20,0.3); --btn-success-shadow: rgba(92,138,74,0.3); --tab-hover: #fdf6ed;
}
.theme-forest {
  --bg-gradient: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 50%, #e8f5e9 100%);
  --header-bg: linear-gradient(135deg, #2e7d32, #1b5e20);
  --header-shadow: rgba(46,125,50,0.3);
  --accent: #2e7d32; --accent-dark: #1b5e20; --accent-hover: #256b28;
  --accent-light: #e8f5e9; --accent-lighter: #c8e6c9; --accent-shadow: rgba(46,125,50,0.2);
  --card-bg: #ffffff; --surface-bg: #f5faf5; --surface-alt: #f0f7f0;
  --text: #1a2e1a; --text-secondary: #5c6b5c; --border: #c8d8c8; --shadow: rgba(0,0,0,0.06);
  --success: #2e7d32; --success-light: #c8e6c9; --success-dark: #1b5e20; --success-shadow: rgba(46,125,50,0.2);
  --error: #c5554b; --error-light: #fae8e5; --error-dark: #a04038; --error-shadow: rgba(197,85,75,0.2);
  --warning: #e8950c; --warning-light: #fef4e0; --warning-dark: #c47a08; --warning-shadow: rgba(232,149,12,0.2);
  --btn-primary-shadow: rgba(46,125,50,0.3); --btn-success-shadow: rgba(46,125,50,0.3); --tab-hover: #e8f5e9;
}
.theme-purple {
  --bg-gradient: linear-gradient(135deg, #f3e8f7 0%, #e1d0f0 50%, #f3e8f7 100%);
  --header-bg: linear-gradient(135deg, #7b2d8b, #5c1d6e);
  --header-shadow: rgba(123,45,139,0.3);
  --accent: #7b2d8b; --accent-dark: #5c1d6e; --accent-hover: #6a2578;
  --accent-light: #f3e8f7; --accent-lighter: #e1d0f0; --accent-shadow: rgba(123,45,139,0.2);
  --card-bg: #ffffff; --surface-bg: #faf7fc; --surface-alt: #f5f0f8;
  --text: #1e1a2e; --text-secondary: #6b5c7b; --border: #d8d0e0; --shadow: rgba(0,0,0,0.06);
  --success: #5c8a6a; --success-light: #e0f0e5; --success-dark: #4a7058; --success-shadow: rgba(92,138,106,0.2);
  --error: #c1555b; --error-light: #fae5e8; --error-dark: #a04048; --error-shadow: rgba(193,85,91,0.2);
  --warning: #c49b38; --warning-light: #fdf5e6; --warning-dark: #b8860b; --warning-shadow: rgba(196,155,56,0.2);
  --btn-primary-shadow: rgba(123,45,139,0.3); --btn-success-shadow: rgba(92,138,106,0.3); --tab-hover: #f3e8f7;
}
body.dark {
  --bg-gradient: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #0f0f1a 100%);
  --card-bg: #1e1e32; --surface-bg: #1e1e32; --surface-alt: #252540;
  --text: #eeebe6; --text-secondary: #b8b2a8; --border: #3c4043;
  --shadow: rgba(0,0,0,0.4); --tab-hover: #2a2a40;
  --success-light: #1a3a2a; --success-dark: #6ecf8a;
  --warning-light: #2d2a18; --warning-dark: #e0b848;
  --accent-light: #1a2838; --accent-lighter: #162032;
}

/* ============================================================
   RESET & BASE
   ============================================================ */
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg-gradient);
  min-height: 100vh;
  color: var(--text);
  transition: background 0.4s ease, color 0.3s ease;
}

/* ============================================================
   LAYOUT: Sidebar + Main
   ============================================================ */
.container {
  display: flex;
  min-height: 100vh;
  gap: 0;
}

/* ---- Sidebar ---- */
.sidebar {
  width: var(--sidebar-width);
  flex-shrink: 0;
  background: var(--card-bg);
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
  box-shadow: 2px 0 16px var(--shadow);
  z-index: 10;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
  transition: background 0.4s ease, border-color 0.4s ease;
}

/* Sidebar brand */
.sidebar-brand {
  padding: 20px 16px 14px;
  text-align: center;
  border-bottom: 1px solid var(--border);
}
.sidebar-brand .brand-icon { font-size: 2.2em; margin-bottom: 4px; }
.sidebar-brand h1 { font-size: 1.1em; font-weight: 700; color: var(--accent); }
.sidebar-brand .subtitle { font-size: 0.7em; color: var(--text-secondary); margin-top: 2px; line-height: 1.3; }
.sidebar-brand .brand-controls {
  display: flex; align-items: center; gap: 6px;
  margin-top: 10px; padding-top: 10px;
  border-top: 1px solid var(--border);
}
.sidebar-brand .theme-select { flex: 1; }
.sidebar-brand .dark-toggle-sidebar { flex-shrink: 0; }

/* Sidebar nav */
.sidebar-nav {
  padding: 12px 12px 8px;
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.sidebar-nav .nav-label {
  font-size: 0.7em; font-weight: 700; color: var(--text-secondary);
  text-transform: uppercase; letter-spacing: 0.05em;
  padding: 8px 8px 4px;
}
.nav-btn {
  display: flex; align-items: center; gap: 10px;
  width: 100%;
  padding: 10px 12px;
  border: none; border-radius: 10px;
  cursor: pointer;
  font-size: 0.88em; font-weight: 600;
  font-family: inherit;
  background: transparent;
  color: var(--text-secondary);
  transition: all 0.25s;
  text-align: left;
}
.nav-btn:hover { background: var(--tab-hover); color: var(--accent); }
.nav-btn.active { background: var(--header-bg); color: #fff; box-shadow: 0 2px 8px var(--header-shadow); }
.nav-btn .nav-icon { font-size: 1.1em; flex-shrink: 0; }

/* Sidebar stats */
.sidebar-stats {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.sidebar-stats .stat-row {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 0.82em; font-weight: 600;
}
.sidebar-stats .stat-label { color: var(--text-secondary); }
.sidebar-stats .stat-val { color: var(--accent); font-weight: 700; font-size: 1.05em; }
.sidebar-stats .stat-val.combo { color: var(--warning-dark); }

.theme-select {
  padding: 4px 6px;
  border: 1.5px solid var(--border);
  border-radius: 6px;
  background: var(--surface-bg);
  color: var(--text);
  font-size: 0.82em;
  font-family: inherit;
  cursor: pointer;
  outline: none;
}
.dark-toggle-sidebar {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  background: var(--surface-bg);
  cursor: pointer;
  font-size: 0.9em;
  transition: all 0.25s;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.dark-toggle-sidebar:hover { background: var(--tab-hover); border-color: var(--accent); }

/* ---- Main Area ---- */
.main-area {
  flex: 1;
  min-width: 0;
  padding: 20px 24px;
  overflow-y: auto;
}

.main-content {
  background: var(--card-bg);
  border-radius: 16px;
  padding: 28px;
  box-shadow: 0 2px 16px var(--shadow);
  min-height: 400px;
  max-width: 900px;
  margin: 0 auto;
}

.section-title { text-align: center; font-size: 1.3em; margin-bottom: 8px; color: var(--accent); }
.section-desc { text-align: center; color: var(--text-secondary); margin-bottom: 20px; font-size: 0.9em; }

/* ============================================================
   BUTTONS
   ============================================================ */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 12px 28px; border: none; border-radius: 10px;
  cursor: pointer; font-size: 1em; font-weight: 600; font-family: inherit;
  transition: all 0.25s;
}
.btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent-hover)); color: #fff; box-shadow: 0 2px 8px var(--btn-primary-shadow); }
.btn-primary:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 4px 16px var(--btn-primary-shadow); }
.btn-success { background: linear-gradient(135deg, var(--success), var(--success-dark)); color: #fff; box-shadow: 0 2px 8px var(--btn-success-shadow); }
.btn-success:hover:not(:disabled) { transform: translateY(-1px); }
.btn-danger { background: linear-gradient(135deg, var(--error), var(--error-dark)); color: #fff; }
.btn-outline { background: var(--card-bg); color: var(--accent); border: 2px solid var(--accent); }
.btn-outline:hover { background: var(--accent-light); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

/* ============================================================
   DISEASE CARD
   ============================================================ */
.disease-card {
  background: linear-gradient(135deg, var(--accent-light), var(--accent-lighter));
  border: 2px solid var(--accent);
  border-radius: 14px; padding: 20px;
  text-align: center; margin-bottom: 20px;
  animation: fadeInUp 0.4s ease;
}
.disease-card .disease-name { font-size: 1.6em; font-weight: 700; color: var(--accent); margin-bottom: 8px; }
.disease-card .disease-info { font-size: 0.9em; color: var(--text-secondary); }
.disease-card .hint-text { font-size: 0.85em; color: var(--warning-dark); margin-top: 6px; }
@keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

/* ============================================================
   PPE GRID — Mode 1
   ============================================================ */
.ppe-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; margin-bottom: 20px; }
.ppe-item {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  padding: 14px 8px; border: 2px solid var(--border); border-radius: 12px;
  cursor: pointer; transition: all 0.2s; background: var(--surface-bg); user-select: none;
}
.ppe-item:hover { border-color: var(--accent); background: var(--accent-light); }
.ppe-item.selected { border-color: var(--accent); background: var(--accent-lighter); box-shadow: 0 0 0 3px var(--accent-shadow); transform: scale(1.03); }
.ppe-item.correct { border-color: var(--success); background: var(--success-light); box-shadow: 0 0 0 3px var(--success-shadow); }
.ppe-item.wrong { border-color: var(--error); background: var(--error-light); box-shadow: 0 0 0 3px var(--error-shadow); animation: shake 0.5s ease; }
.ppe-item.missed { border-color: var(--warning); background: var(--warning-light); box-shadow: 0 0 0 3px var(--warning-shadow); }
.ppe-item .ppe-icon { font-size: 2em; }
.ppe-item .ppe-name { font-size: 0.8em; font-weight: 600; text-align: center; line-height: 1.2; }
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-6px); } 40% { transform: translateX(6px); }
  60% { transform: translateX(-4px); } 80% { transform: translateX(4px); }
}

/* ============================================================
   CATEGORY BUCKETS — Mode 2
   ============================================================ */
.category-buckets { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; }
@media (max-width: 500px) { .category-buckets { grid-template-columns: repeat(2, 1fr); } }
.category-bucket {
  border: 2px dashed var(--border); border-radius: 12px; padding: 16px 10px;
  text-align: center; cursor: pointer; transition: all 0.25s; min-height: 80px;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
}
.category-bucket:hover { border-color: var(--accent); background: var(--accent-light); transform: translateY(-2px); }
.category-bucket .bucket-icon { font-size: 1.8em; }
.category-bucket .bucket-name { font-size: 0.85em; font-weight: 600; }
.category-bucket .bucket-count { font-size: 0.75em; color: var(--text-secondary); }
.category-bucket.correct-flash { border-color: var(--success); background: var(--success-light); animation: popIn 0.4s ease; }
.category-bucket.wrong-flash { border-color: var(--error); background: var(--error-light); animation: shake 0.5s ease; }
@keyframes popIn { 0% { transform: scale(1); } 50% { transform: scale(1.08); } 100% { transform: scale(1); } }

/* ============================================================
   QUIZ — Mode 3
   ============================================================ */
.quiz-question { font-size: 1.15em; font-weight: 600; text-align: center; margin-bottom: 20px; padding: 16px; background: var(--surface-alt); border-radius: 12px; line-height: 1.6; }
.options-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
.option-item {
  display: flex; align-items: center; gap: 12px; padding: 14px 16px;
  border: 2px solid var(--border); border-radius: 12px; cursor: pointer;
  transition: all 0.2s; font-size: 0.95em;
}
.option-item:hover { border-color: var(--accent); background: var(--accent-light); }
.option-item.selected-option { border-color: var(--accent); background: var(--accent-lighter); }
.option-item.correct-answer { border-color: var(--success); background: var(--success-light); }
.option-item.wrong-answer { border-color: var(--error); background: var(--error-light); animation: shake 0.5s ease; }
.option-letter {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--accent-light); color: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; flex-shrink: 0;
}
.option-item.selected-option .option-letter { background: var(--accent); color: #fff; }
.option-item.correct-answer .option-letter { background: var(--success); color: #fff; }
.option-item.wrong-answer .option-letter { background: var(--error); color: #fff; }
.question-type { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.8em; font-weight: 600; margin-bottom: 12px; }
.qtype-single { background: var(--accent-light); color: var(--accent); }
.qtype-truefalse { background: var(--warning-light); color: var(--warning-dark); }
.qtype-multi { background: var(--success-light); color: var(--success); }

/* ============================================================
   RESULT SCREEN
   ============================================================ */
.result-screen { text-align: center; padding: 30px 20px; animation: fadeInUp 0.5s ease; }
.result-score { font-size: 4em; font-weight: 800; background: linear-gradient(135deg, var(--accent), var(--accent-dark)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.result-stats { display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; margin: 20px 0; }
.result-stat { text-align: center; }
.result-stat .stat-val { font-size: 1.8em; font-weight: 700; color: var(--accent); }
.result-stat .stat-label { font-size: 0.85em; color: var(--text-secondary); }
.result-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 20px; }

/* ============================================================
   STATS PANEL
   ============================================================ */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; margin-bottom: 20px; }
.stat-card { background: var(--surface-alt); border-radius: 12px; padding: 16px; text-align: center; }
.stat-card .stat-num { font-size: 1.8em; font-weight: 700; color: var(--accent); }
.stat-card .stat-title { font-size: 0.82em; color: var(--text-secondary); margin-top: 2px; }
.wrong-list { max-height: 400px; overflow-y: auto; margin-top: 16px; }
.wrong-item { background: var(--warning-light); border-left: 4px solid var(--warning); padding: 12px 16px; margin-bottom: 8px; border-radius: 0 8px 8px 0; font-size: 0.9em; line-height: 1.5; }
.wrong-item .correct-ans { color: var(--success); font-weight: 600; }
.retry-box { border: 2px solid var(--warning); background: var(--warning-light); }

/* Knowledge table */
.knowledge-table-wrap { overflow-x: auto; overflow-y: auto; max-height: calc(100vh - 200px); margin-top: 16px; border-radius: 8px; }
.knowledge-table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 0.85em; }
.knowledge-table thead { position: sticky; top: 0; z-index: 2; }
.knowledge-table th { background: var(--accent); color: #fff; padding: 10px 8px; text-align: left; white-space: nowrap; position: sticky; top: 0; }
.knowledge-table th:first-child { border-radius: 8px 0 0 0; }
.knowledge-table th:last-child { border-radius: 0 8px 0 0; }
.knowledge-table td { padding: 8px; border-bottom: 1px solid var(--border); vertical-align: top; line-height: 1.4; }
.knowledge-table tr:hover td { background: var(--accent-light); }
.knowledge-table tr:nth-child(even) td { background: var(--surface-bg); }
.knowledge-table tr:nth-child(even):hover td { background: var(--accent-light); }

/* ============================================================
   TOAST & COMBO
   ============================================================ */
.toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 12px 24px; border-radius: 10px; font-weight: 600; color: #fff; z-index: 1000; animation: toastIn 0.3s ease, toastOut 0.3s ease 1.5s forwards; pointer-events: none; }
.toast-success { background: var(--success); }
.toast-error { background: var(--error); }
.toast-info { background: var(--accent); }
@keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(-20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
@keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }

.combo-pop { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 2em; font-weight: 800; color: var(--warning-dark); pointer-events: none; z-index: 999; animation: comboUp 1s ease forwards; }
@keyframes comboUp { 0% { opacity: 1; transform: translate(-50%, -50%) scale(1); } 100% { opacity: 0; transform: translate(-50%, -80%) scale(1.5); } }

/* ============================================================
   PROGRESS & TIMER
   ============================================================ */
.progress-bar-wrap { background: #e8e8e8; border-radius: 10px; height: 8px; margin-bottom: 16px; overflow: hidden; }
.progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--success)); border-radius: 10px; transition: width 0.3s ease; }
.timer-bar-wrap { background: #e8e8e8; border-radius: 10px; height: 6px; margin-bottom: 16px; overflow: hidden; }
.timer-bar-fill { height: 100%; background: var(--success); border-radius: 10px; transition: width 0.1s linear; }
.timer-bar-fill.warning { background: var(--warning); }
.timer-bar-fill.danger { background: var(--error); }
.timer-toggle { display: inline-flex; align-items: center; gap: 4px; padding: 6px 14px; border: 2px solid var(--border); border-radius: 20px; cursor: pointer; font-size: 0.82em; font-weight: 600; font-family: inherit; background: var(--surface-alt); color: var(--text-secondary); transition: all 0.25s; }
.timer-toggle:hover { border-color: var(--warning-dark); color: var(--warning-dark); background: var(--warning-light); }

/* ============================================================
   EMPTY STATE & HELPERS
   ============================================================ */
.empty-state { text-align: center; padding: 40px 20px; color: var(--text-secondary); }
.empty-state .empty-icon { font-size: 3em; margin-bottom: 12px; }
.hidden { display: none !important; }
#searchRef { width: 100%; padding: 10px 14px; border: 2px solid var(--border); border-radius: 10px; font-size: 0.95em; background: var(--card-bg); color: var(--text); outline: none; font-family: inherit; }
#searchRef:focus { border-color: var(--accent); }
#searchRef::placeholder { color: var(--text-secondary); }

/* Dark mode extras */
body.dark .progress-bar-wrap,
body.dark .timer-bar-wrap { background: #333; }
body.dark .wrong-item { background: #2d2a18; }
body.dark .knowledge-table th { background: var(--accent-dark); }

<script>
// ============================================================
// DATA LAYER
// ============================================================
const DISEASES = [
  { id: 1, name: '多重耐药菌', transmission: '接触传播', isolation: '接触隔离', basic: ['手套','隔离衣'], optional: ['医用外科口罩','帽子'], category: 'contact' },
  { id: 2, name: '甲肝、戊肝', transmission: '接触传播（粪-口传播）', isolation: '接触隔离（独立卫生间）', basic: ['手套','隔离衣'], optional: ['医用外科口罩','帽子'], category: 'contact' },
  { id: 3, name: '伤寒、副伤寒', transmission: '接触传播（粪-口传播）', isolation: '接触隔离（独立卫生间）', basic: ['手套','隔离衣'], optional: ['医用外科口罩','帽子'], category: 'contact' },
  { id: 4, name: '细菌性痢疾', transmission: '接触传播（粪-口传播）', isolation: '接触隔离（独立卫生间）', basic: ['手套','隔离衣'], optional: ['帽子'], category: 'contact' },
  { id: 5, name: '狂犬病', transmission: '接触传播', isolation: '接触隔离', basic: ['医用外科口罩','手套','隔离衣'], optional: ['护目镜/防护面屏','帽子'], category: 'contact' },
  { id: 6, name: '霍乱', transmission: '接触传播（粪-口传播）', isolation: '接触隔离（按甲类传染病落实）', basic: ['手套','隔离衣','鞋套'], optional: ['医用外科口罩','帽子','医用一次性防护服'], category: 'contact' },
  { id: 7, name: 'HIV、梅毒', transmission: '性接触传播 / 接触患者体液传播', isolation: '接触隔离', basic: ['手套'], optional: ['隔离衣'], category: 'contact' },
  { id: 8, name: '乙肝、丙肝、丁肝', transmission: '性接触传播 / 接触患者体液传播', isolation: '接触隔离', basic: [], optional: ['手套','隔离衣'], category: 'contact' },
  { id: 9, name: '猴痘', transmission: '性接触 / 接触患者体液 / 飞沫传播', isolation: '接触隔离+飞沫隔离', basic: ['医用防护口罩','帽子','手套','隔离衣'], optional: ['护目镜/防护面罩'], category: 'contact+droplet' },
  { id: 10, name: '肺结核', transmission: '空气传播', isolation: '空气隔离（负压病房）', basic: ['医用防护口罩','帽子','手套','鞋套'], optional: ['护目镜/防护面罩','隔离衣','医用一次性防护服'], category: 'airborne' },

  { id: 12, name: '百日咳', transmission: '飞沫传播', isolation: '飞沫隔离', basic: ['医用外科口罩','帽子'], optional: ['手套','隔离衣','医用防护口罩'], category: 'droplet' },
  { id: 13, name: '流行性感冒', transmission: '飞沫传播 / 接触传播', isolation: '接触隔离+飞沫隔离', basic: ['医用外科口罩','帽子','手套'], optional: ['医用防护口罩'], category: 'contact+droplet' },
  { id: 14, name: '脊髓灰质炎/猩红热/白喉', transmission: '飞沫传播 / 接触传播', isolation: '接触隔离+飞沫隔离', basic: ['医用外科口罩','帽子','手套','隔离衣'], optional: ['医用防护口罩'], category: 'contact+droplet' },
  { id: 15, name: '流行性脑脊髓膜炎', transmission: '飞沫传播 / 接触传播（以飞沫为主）', isolation: '接触隔离+飞沫隔离', basic: ['医用外科口罩','帽子','手套','隔离衣'], optional: ['医用防护口罩','护目镜/防护面罩'], category: 'contact+droplet' },
  { id: 16, name: '炭疽', transmission: '飞沫传播 / 接触传播', isolation: '接触隔离+飞沫隔离（肺炭疽按乙类甲管）', basic: ['医用外科口罩','帽子','手套','隔离衣'], optional: ['医用一次性防护服','护目镜/防护面罩','医用防护口罩'], category: 'contact+droplet' },
  { id: 17, name: '手足口病', transmission: '飞沫传播 / 接触传播（以接触为主）', isolation: '接触隔离+飞沫隔离', basic: ['医用外科口罩','帽子','手套','隔离衣'], optional: ['护目镜/防护面罩','医用防护口罩'], category: 'contact+droplet' },
  { id: 18, name: 'SARS / 人感染高致病性禽流感', transmission: '飞沫传播 / 接触传播', isolation: '接触隔离+飞沫隔离（按乙类甲管）', basic: ['医用外科口罩','帽子','手套','隔离衣','鞋套'], optional: ['医用一次性防护服','护目镜/防护面罩','医用防护口罩'], category: 'contact+droplet' },
  { id: 19, name: '腺鼠疫', transmission: '生物媒介传播 / 接触传播', isolation: '接触隔离（按甲类传染病落实）', basic: ['手套','隔离衣'], optional: ['医用外科口罩','帽子','护目镜/防护面罩'], category: 'special' },
  { id: 20, name: '肺鼠疫', transmission: '生物媒介 / 飞沫 / 接触传播（以飞沫为主）', isolation: '接触隔离+飞沫隔离（按甲类传染病落实）', basic: ['医用外科口罩','帽子','手套','隔离衣'], optional: ['医用防护口罩','医用一次性防护服','护目镜/防护面罩'], category: 'contact+droplet' },
  { id: 21, name: '水痘、麻疹', transmission: '接触 / 空气 / 飞沫传播', isolation: '接触隔离+飞沫隔离+空气隔离', basic: ['医用防护口罩','帽子','手套','隔离衣'], optional: ['护目镜/防护面屏'], category: 'contact+droplet+airborne' },
  { id: 22, name: '新型冠状病毒肺炎', transmission: '接触 / 空气 / 飞沫传播', isolation: '接触隔离+飞沫隔离+空气隔离', basic: ['医用外科口罩','帽子','手套','隔离衣'], optional: ['护目镜/防护面屏','医用防护口罩','医用一次性防护服'], category: 'contact+droplet+airborne' },
  { id: 23, name: '登革热', transmission: '蚊媒传播', isolation: '防蚊隔离', basic: ['长衣长袖'], optional: [], category: 'special' },
  { id: 24, name: '埃博拉', transmission: '性接触传播 / 接触患者体液传播', isolation: '接触隔离（按甲类传染病落实）', basic: ['医用防护口罩','帽子','手套','隔离衣','鞋套'], optional: ['医用防护口罩','医用一次性防护服','护目镜/防护面罩'], category: 'contact' },
];

DISEASES.forEach(d => {
  d.basic = d.basic.filter(Boolean);
  d.optional = d.optional.filter(Boolean);
  d.optional = d.optional.filter(o => !d.basic.includes(o));
});

function normalizePPE(arr) { return arr.map(p => p === '护目镜/防护面罩' ? '护目镜/防护面屏' : p); }
DISEASES.forEach(d => { d.basic = normalizePPE(d.basic); d.optional = normalizePPE(d.optional); });

const PPE_DISPLAY = [
  { id: '手套', icon: '🧤', name: '手套' }, { id: '隔离衣', icon: '👔', name: '隔离衣' },
  { id: '医用外科口罩', icon: '😷', name: '医用外科口罩' }, { id: '医用防护口罩', icon: '😷‍💨', name: '医用防护口罩' },
  { id: '帽子', icon: '🧢', name: '帽子' }, { id: '鞋套', icon: '👟', name: '鞋套' },
  { id: '护目镜/防护面屏', icon: '🥽', name: '护目镜/面屏' },
  { id: '医用一次性防护服', icon: '🛡️', name: '一次性防护服' }, { id: '长衣长袖', icon: '👘', name: '长衣长袖' },
];

const CATEGORIES = [
  { id: 'contact', name: '接触隔离', icon: '🤝', desc: '接触传播疾病' },
  { id: 'droplet', name: '飞沫隔离', icon: '💧', desc: '飞沫传播疾病' },
  { id: 'airborne', name: '空气隔离', icon: '🌬️', desc: '空气传播疾病' },
  { id: 'contact+droplet', name: '接触+飞沫', icon: '🤝💧', desc: '接触+飞沫传播' },
  { id: 'contact+droplet+airborne', name: '三种途径', icon: '⚠️', desc: '三种途径传播' },
  { id: 'special', name: '特殊隔离', icon: '🔬', desc: '特殊传播途径' },
];

// ============================================================
// GAME STATE
// ============================================================
let state = {
  currentTab: 'mode1', score: 0, combo: 0, maxCombo: 0, totalAnswered: 0, correctAnswered: 0,
  mode1: { currentIndex: 0, diseases: [], selected: new Set(), answered: false, round: 0, roundTotal: 5 },
  mode2: { currentIndex: 0, diseases: [], answered: false, round: 0, roundTotal: 10, timer: null, timeLeft: 8, timerEnabled: false },
  mode3: { currentIndex: 0, questions: [], answered: false, round: 0, roundTotal: 10, timer: null, timeLeft: 10, timerEnabled: false },
};

// ============================================================
// PERSISTENCE
// ============================================================
function loadStats() {
  try {
    const d = JSON.parse(localStorage.getItem('infection_game_stats') || '{}');
    return { totalScore: d.totalScore||0, totalAnswered: d.totalAnswered||0, correctAnswered: d.correctAnswered||0, maxCombo: d.maxCombo||0, wrongBook: d.wrongBook||[], diseaseStats: d.diseaseStats||{} };
  } catch { return { totalScore:0, totalAnswered:0, correctAnswered:0, maxCombo:0, wrongBook:[], diseaseStats:{} }; }
}
function saveStats() {
  const s = loadStats();
  s.totalScore += state.score; s.totalAnswered += state.totalAnswered; s.correctAnswered += state.correctAnswered;
  s.maxCombo = Math.max(s.maxCombo, state.maxCombo);
  localStorage.setItem('infection_game_stats', JSON.stringify(s));
}
function addWrong(diseaseId, question, userAnswer, correctAnswer, mode) {
  const s = loadStats();
  s.wrongBook.push({ diseaseId, question, userAnswer, correctAnswer, mode, time: new Date().toLocaleString('zh-CN') });
  if (s.wrongBook.length > 200) s.wrongBook = s.wrongBook.slice(-200);
  localStorage.setItem('infection_game_stats', JSON.stringify(s));
}
function recordDiseaseResult(diseaseId, isCorrect) {
  const s = loadStats();
  if (!s.diseaseStats) s.diseaseStats = {};
  if (!s.diseaseStats[diseaseId]) { const d = DISEASES.find(x => x.id === diseaseId); s.diseaseStats[diseaseId] = { name: d?d.name:'未知', correct:0, wrong:0 }; }
  if (isCorrect) s.diseaseStats[diseaseId].correct++; else s.diseaseStats[diseaseId].wrong++;
  localStorage.setItem('infection_game_stats', JSON.stringify(s));
}

// ============================================================
// UTILITY
// ============================================================
function shuffle(arr) { const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function showToast(msg,type){const c=document.getElementById('toastContainer');const e=document.createElement('div');e.className=`toast toast-${type}`;e.textContent=msg;c.appendChild(e);setTimeout(()=>e.remove(),2000);}
function showComboPop(combo){if(combo<3)return;const e=document.createElement('div');e.className='combo-pop';e.textContent=`🔥 ${combo}连击！`;document.body.appendChild(e);setTimeout(()=>e.remove(),1000);}
function updateStatusBar(){
  document.getElementById('globalScore').textContent=state.score;
  document.getElementById('globalCombo').textContent=state.combo;
  document.getElementById('globalTotal').textContent=state.totalAnswered;
  document.getElementById('globalAccuracy').textContent=state.totalAnswered>0?Math.round(state.correctAnswered/state.totalAnswered*100)+'%':'-';
}
function resetRoundState(mode){
  state.score=0;state.combo=0;state.totalAnswered=0;state.correctAnswered=0;
  if(mode==='mode1'){state.mode1={currentIndex:0,diseases:shuffle(DISEASES).slice(0,5),selected:new Set(),answered:false,round:0,roundTotal:5};}
  else if(mode==='mode2'){if(state.mode2.timer)clearInterval(state.mode2.timer);const tp=localStorage.getItem('infection_game_timer')==='1';state.mode2={currentIndex:0,diseases:shuffle(DISEASES).slice(0,10),answered:false,round:0,roundTotal:10,timer:null,timeLeft:8,timerEnabled:tp};}
  else if(mode==='mode3'){if(state.mode3.timer)clearInterval(state.mode3.timer);const tp=localStorage.getItem('infection_game_timer')==='1';state.mode3={currentIndex:0,questions:[],answered:false,round:0,roundTotal:10,timer:null,timeLeft:10,timerEnabled:tp};}
  updateStatusBar();
}

// ============================================================
// TAB SWITCHING
// ============================================================
function switchTab(tab){
  state.currentTab=tab;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  renderTab(tab);
}
function renderTab(tab){
  switch(tab){case 'mode1':renderMode1();break;case 'mode2':renderMode2();break;case 'mode3':renderMode3();break;case 'stats':renderStats();break;case 'wrongbook':renderWrongBook();break;case 'reference':renderReference();break;}
}

// ============================================================
// MODE 1: PPE SELECTION
// ============================================================
function renderMode1(){
  const m=state.mode1,container=document.getElementById('mainContent');
  if(m.currentIndex>=m.roundTotal){renderMode1Result(container);return;}
  const disease=m.diseases[m.currentIndex],progress=Math.round(m.currentIndex/m.roundTotal*100);
  const hint=disease.transmission.includes('空气')?'💡 提示：该疾病可通过空气传播，注意防护等级！':disease.transmission.includes('飞沫')?'💡 提示：该疾病可通过飞沫传播':disease.transmission.includes('接触')?'💡 提示：该疾病可通过接触传播':'';
  container.innerHTML=`
    <div class="section-title">🛡️ 防护装备选择挑战</div>
    <div class="section-desc">根据疾病选择正确的防护装备组合（第${m.currentIndex+1}/${m.roundTotal}题）</div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${progress}%"></div></div>
    <div class="disease-card"><div class="disease-name">${disease.name}</div><div class="disease-info">传播途径：${disease.transmission}</div><div class="disease-info">隔离方式：${disease.isolation}</div>${hint?`<div class="hint-text">${hint}</div>`:''}</div>
    <div style="font-weight:600;margin-bottom:8px;color:var(--text-secondary);">请选择<b>基本防护装备</b>（必选）+ <b>可选防护装备</b>（加分）：</div>
    <div class="ppe-grid" id="ppeGrid"></div>
    <div style="text-align:center;margin-top:16px;"><button class="btn btn-primary" id="submitPPE" ${m.answered?'disabled':''}>✅ 提交答案</button>${m.answered?` <button class="btn btn-outline" id="nextPPE">下一题 ➡️</button>`:''}</div>
    ${m.answered?`<div id="feedbackArea" style="margin-top:16px;text-align:center;font-weight:600;"></div>`:''}`;
  const grid=document.getElementById('ppeGrid');
  PPE_DISPLAY.forEach(ppe=>{
    const div=document.createElement('div');div.className='ppe-item';div.dataset.ppeId=ppe.id;
    if(m.selected.has(ppe.id))div.classList.add('selected');
    if(m.answered){const isB=disease.basic.includes(ppe.id),isO=disease.optional.includes(ppe.id),wasS=m.selected.has(ppe.id);if((isB||isO)&&wasS)div.classList.add('correct');else if(wasS&&!isB&&!isO)div.classList.add('wrong');else if(isB&&!wasS)div.classList.add('missed');}
    div.innerHTML=`<span class="ppe-icon">${ppe.icon}</span><span class="ppe-name">${ppe.name}</span>`;
    if(!m.answered)div.addEventListener('click',()=>{if(m.selected.has(ppe.id))m.selected.delete(ppe.id);else m.selected.add(ppe.id);div.classList.toggle('selected');});
    grid.appendChild(div);
  });
  if(!m.answered){document.getElementById('submitPPE').addEventListener('click',()=>submitMode1(disease));}
  else{const fb=document.getElementById('feedbackArea'),allOk=disease.basic.every(b=>m.selected.has(b))&&disease.optional.every(o=>m.selected.has(o))&&[...m.selected].every(s=>disease.basic.includes(s)||disease.optional.includes(s));fb.innerHTML=allOk?'<span style="color:var(--success);">🎉 太棒了！完全正确！</span>':'<span style="color:var(--error);">😔 有遗漏或多余的选择，请看上方颜色标记：</span><br><span style="font-size:0.85em;">🟢 正确选择 | 🔴 错误选择 | 🟡 遗漏的必选项</span>';document.getElementById('nextPPE').addEventListener('click',()=>{m.currentIndex++;m.selected=new Set();m.answered=false;renderMode1();});}
  updateStatusBar();
}
function submitMode1(disease){
  const m=state.mode1;m.answered=true;const selected=[...m.selected];
  const cb=disease.basic.every(b=>selected.includes(b)),ei=selected.filter(s=>!disease.basic.includes(s)&&!disease.optional.includes(s));
  const mb=disease.basic.filter(b=>!selected.includes(b)),co=disease.optional.filter(o=>selected.includes(o));
  let p=0;if(cb&&ei.length===0){p+=60;p+=co.length*(40/Math.max(1,disease.optional.length));}else if(cb&&ei.length>0){p+=30;p-=ei.length*20;}else{p-=mb.length*20;p-=ei.length*20;}p=Math.round(p);
  if(p>0){state.combo++;state.correctAnswered++;if(state.combo>state.maxCombo)state.maxCombo=state.combo;showToast(`✅ 正确！+${p}分`,'success');showComboPop(state.combo);}
  else{state.combo=0;showToast(`❌ 继续加油！${p}分`,'error');addWrong(disease.id,`请为「${disease.name}」选择防护装备`,selected.join('、')||'未选择',`基本：${disease.basic.join('、')}；可选：${disease.optional.join('、')||'无'}`,'mode1');}
  state.score+=p;state.totalAnswered++;recordDiseaseResult(disease.id,p>0);saveStats();renderMode1();
}

function generateQuestions(){
  const qs=[];
  DISEASES.forEach(d=>{
    const wt=DISEASES.filter(x=>x.id!==d.id&&x.transmission!==d.transmission).slice(0,3);
    if(wt.length>=2){const o=shuffle([d.transmission,...wt.slice(0,3).map(x=>x.transmission)].filter((v,i,a)=>a.indexOf(v)===i));if(o.length>=3)qs.push({type:'single',diseaseId:d.id,question:`「${d.name}」的主要传播途径是什么？`,options:o.slice(0,4),answer:d.transmission});}
    const wi=DISEASES.filter(x=>x.id!==d.id&&x.isolation!==d.isolation).slice(0,3);
    if(wi.length>=2){const o=shuffle([d.isolation,...wi.slice(0,3).map(x=>x.isolation)].filter((v,i,a)=>a.indexOf(v)===i));if(o.length>=3)qs.push({type:'single',diseaseId:d.id,question:`「${d.name}」的隔离方式是什么？`,options:o.slice(0,4),answer:d.isolation});}
    if(d.basic.length>0){const cp=d.basic[Math.floor(Math.random()*d.basic.length)],isT=Math.random()>0.5,rw=PPE_DISPLAY.find(p=>!d.basic.includes(p.id)&&!d.optional.includes(p.id));qs.push({type:'truefalse',diseaseId:d.id,question:isT?`「${d.name}」的基本防护是否需要配备「${cp}」？`:(rw?`「${d.name}」的基本防护是否需要配备「${rw.name}」？`:`「${d.name}」只需要隔离衣即可？`),options:['✅ 正确','❌ 错误'],answer:isT?'✅ 正确':'❌ 错误'});}
    if(d.basic.length>=2&&d.basic.length<=5){const ds=PPE_DISPLAY.filter(p=>!d.basic.includes(p.id)).slice(0,3).map(p=>p.name);qs.push({type:'multi',diseaseId:d.id,question:`「${d.name}」的基本防护要求包括哪些？（多选）`,options:shuffle([...d.basic,...ds]).slice(0,6),answer:d.basic});}
  });
  return shuffle(qs).slice(0,10);
}

  const list=document.getElementById('optionsList'),so=new Set();
  q.options.forEach((opt,i)=>{const div=document.createElement('div');div.className='option-item';div.dataset.option=opt;div.innerHTML=`<span class="option-letter">${String.fromCharCode(65+i)}</span><span>${opt}</span>`;if(!m.answered){div.addEventListener('click',()=>{if(q.type==='multi'){if(so.has(opt)){so.delete(opt);div.classList.remove('selected-option');}else{so.add(opt);div.classList.add('selected-option');}}else submitMode3(q,[opt]);});}else{const isA=q.type==='multi'?q.answer.includes(opt):q.answer===opt;if(isA)div.classList.add('correct-answer');if(m._userAnswer&&m._userAnswer.includes(opt)&&!isA)div.classList.add('wrong-answer');}list.appendChild(div);});

function updateMode3Timer(){const f=document.getElementById('timerBarFill3');if(!f)return;const p=Math.round(state.mode3.timeLeft/10*100);f.style.width=p+'%';f.classList.toggle('warning',state.mode3.timeLeft<5);f.classList.toggle('danger',state.mode3.timeLeft<3);}

function submitMode3(q,userAnswer){
  const m=state.mode3;if(m.answered)return;m.answered=true;if(m.timer){clearInterval(m.timer);m.timer=null;}

}

  const s=loadStats(),wdi=[...new Set(s.wrongBook.map(w=>w.diseaseId).filter(Boolean))],wd=wdi.map(id=>DISEASES.find(d=>d.id===id)).filter(Boolean);
  if(wd.length===0){showToast('没有错题可以练习！','info');return;}
  resetRoundState(mode);if(mode==='mode1'){state.mode1.diseases=shuffle(wd).slice(0,Math.min(5,wd.length));state.mode1.roundTotal=state.mode1.diseases.length;}else if(mode==='mode2'){state.mode2.diseases=shuffle(wd).slice(0,Math.min(10,wd.length));state.mode2.roundTotal=state.mode2.diseases.length;}
  state.currentTab=mode;document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===mode));
  updateStatusBar();renderTab(mode);showToast(`🎯 开始错题重练！共 ${mode==='mode1'?state.mode1.roundTotal:state.mode2.roundTotal} 题`,'info');
}
function exportStats(){const s=loadStats(),d=JSON.stringify(s,null,2),b=new Blob([d],{type:'application/json'}),u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download=`infection-game-stats-${new Date().toISOString().slice(0,10)}.json`;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);showToast('✅ 学习数据已导出！','success');}
function importStats(event){const f=event.target.files[0];if(!f)return;const r=new FileReader();r.onload=function(e){try{const d=JSON.parse(e.target.result);if(typeof d.totalScore!=='number'||typeof d.totalAnswered!=='number')throw new Error('数据格式不正确');if(confirm(`即将导入数据：\n- 累计总分：${d.totalScore}\n- 累计答题：${d.totalAnswered}\n- 错题数：${(d.wrongBook||[]).length}\n\n确定要覆盖当前数据吗？`)){localStorage.setItem('infection_game_stats',JSON.stringify(d));showToast('✅ 学习数据已导入！','success');renderStats();}}catch(err){showToast('❌ 文件格式不正确，请选择有效的导出文件','error');}};r.readAsText(f);event.target.value='';}

// ============================================================
// KNOWLEDGE REFERENCE
// ============================================================
function renderReference(){
  const container=document.getElementById('mainContent');
  container.innerHTML=`<div class="section-title">📖 知识速查表</div><div class="section-desc">23种常见传染病的防护要求速查（源自培训教材）</div><div style="margin-bottom:12px;"><input type="text" id="searchRef" placeholder="🔍 搜索疾病名称..." oninput="filterReference()"></div><div class="knowledge-table-wrap"><table class="knowledge-table" id="refTable"><thead><tr><th>疾病名称</th><th>传播途径</th><th>隔离方式</th><th>基本防护要求</th><th>可选防护用品</th></tr></thead><tbody>${DISEASES.map(d=>`<tr data-search="${d.name}"><td><strong>${d.name}</strong></td><td>${d.transmission}</td><td>${d.isolation}</td><td>${d.basic.length>0?d.basic.map(p=>`<span style="background:var(--success-light);color:var(--success-dark);padding:2px 6px;border-radius:4px;margin:1px;display:inline-block;font-size:0.8em;font-weight:600;">${p}</span>`).join(' '):'<span style="color:var(--text-secondary);">—</span>'}</td><td>${d.optional.length>0?d.optional.map(p=>`<span style="background:var(--warning-light);color:var(--warning-dark);padding:2px 6px;border-radius:4px;margin:1px;display:inline-block;font-size:0.8em;font-weight:600;">${p}</span>`).join(' '):'<span style="color:var(--text-secondary);">—</span>'}</td></tr>`).join('')}</tbody></table></div>`;
  updateStatusBar();
}
function filterReference(){const q=document.getElementById('searchRef')?.value?.toLowerCase()||'';document.querySelectorAll('#refTable tbody tr').forEach(tr=>{tr.style.display=tr.dataset.search?.toLowerCase().includes(q)?'':'none';});}

// ============================================================
// THEME
// ============================================================
function setTheme(themeName){
  document.body.classList.remove('theme-warm','theme-forest','theme-purple');
  if(themeName)document.body.classList.add(`theme-${themeName}`);
  document.getElementById('themeSelect').value=themeName;
  localStorage.setItem('infection_game_theme',themeName);
}
function initTheme(){
  const saved=localStorage.getItem('infection_game_theme')||'';
  if(saved){document.body.classList.add(`theme-${saved}`);document.getElementById('themeSelect').value=saved;}
}

// ============================================================
// DARK MODE
// ============================================================
function toggleDarkMode(){
  const body=document.body,isDark=!body.classList.contains('dark');
  body.classList.toggle('dark');
  document.getElementById('darkToggle').textContent=isDark?'☀️':'🌙';
  localStorage.setItem('infection_game_dark',isDark?'1':'0');
}
function initDarkMode(){
  if(localStorage.getItem('infection_game_dark')==='1'){document.body.classList.add('dark');document.getElementById('darkToggle').textContent='☀️';}
}

// ============================================================
// INIT
// ============================================================
function init(){
  initTheme();initDarkMode();
  state.currentTab='mode1';state.score=0;state.combo=0;state.totalAnswered=0;state.correctAnswered=0;
  state.mode1.diseases=shuffle(DISEASES).slice(0,5);state.mode2.diseases=shuffle(DISEASES).slice(0,10);state.mode3.questions=generateQuestions();
  const tp=localStorage.getItem('infection_game_timer')==='1';state.mode2.timerEnabled=tp;state.mode3.timerEnabled=tp;
  updateStatusBar();renderTab('mode1');
}
document.addEventListener('DOMContentLoaded',init);
</script>
