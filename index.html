<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏥 传染病防护知识培训游戏</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: linear-gradient(135deg, #e8f0fe 0%, #d2e3fc 50%, #e8f0fe 100%);
  min-height: 100vh;
  color: #1a1a2e;
}
.container {
  max-width: 960px;
  margin: 0 auto;
  padding: 16px;
}
/* Header */
.header {
  background: linear-gradient(135deg, #1a73e8, #0d47a1);
  color: #fff;
  text-align: center;
  padding: 20px 24px;
  border-radius: 16px;
  margin-bottom: 12px;
  box-shadow: 0 4px 20px rgba(26,115,232,0.3);
}
.header h1 { font-size: 1.8em; margin-bottom: 4px; }
.header .subtitle { font-size: 0.9em; opacity: 0.9; }
/* Tabs */
.tabs {
  display: flex;
  gap: 6px;
  background: #fff;
  border-radius: 14px;
  padding: 6px;
  margin-bottom: 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  flex-wrap: wrap;
}
.tab-btn {
  flex: 1;
  min-width: 80px;
  padding: 12px 8px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-size: 0.9em;
  font-weight: 600;
  transition: all 0.25s;
  background: transparent;
  color: #5f6368;
}
.tab-btn:hover { background: #e8f0fe; color: #1a73e8; }
.tab-btn.active {
  background: linear-gradient(135deg, #1a73e8, #0d47a1);
  color: #fff;
  box-shadow: 0 2px 8px rgba(26,115,232,0.3);
}
/* Status Bar */
.status-bar {
  display: flex;
  justify-content: center;
  gap: 24px;
  background: #fff;
  border-radius: 14px;
  padding: 12px 20px;
  margin-bottom: 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  flex-wrap: wrap;
}
.status-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-weight: 600;
  font-size: 0.95em;
}
.status-item .icon { font-size: 1.2em; }
.score-val { color: #1a73e8; }
.combo-val { color: #e37400; }
.life-val { color: #d93025; }
.timer-val { color: #0d904f; }
/* Main Content */
.main-content {
  background: #fff;
  border-radius: 16px;
  padding: 24px;
  box-shadow: 0 2px 16px rgba(0,0,0,0.06);
  min-height: 400px;
}
.section-title {
  text-align: center;
  font-size: 1.3em;
  margin-bottom: 8px;
  color: #1a73e8;
}
.section-desc {
  text-align: center;
  color: #5f6368;
  margin-bottom: 20px;
  font-size: 0.9em;
}
/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 12px 28px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-size: 1em;
  font-weight: 600;
  transition: all 0.25s;
}
.btn-primary {
  background: linear-gradient(135deg, #1a73e8, #1557b0);
  color: #fff;
  box-shadow: 0 2px 8px rgba(26,115,232,0.3);
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(26,115,232,0.4); }
.btn-success {
  background: linear-gradient(135deg, #0d904f, #0a7a3f);
  color: #fff;
  box-shadow: 0 2px 8px rgba(13,144,79,0.3);
}
.btn-success:hover { transform: translateY(-1px); }
.btn-danger {
  background: linear-gradient(135deg, #d93025, #b3261e);
  color: #fff;
}
.btn-outline {
  background: #fff;
  color: #1a73e8;
  border: 2px solid #1a73e8;
}
.btn-outline:hover { background: #e8f0fe; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }
/* Disease Card */
.disease-card {
  background: linear-gradient(135deg, #e8f0fe, #d2e3fc);
  border: 2px solid #1a73e8;
  border-radius: 14px;
  padding: 20px;
  text-align: center;
  margin-bottom: 20px;
  animation: fadeInUp 0.4s ease;
}
.disease-card .disease-name {
  font-size: 1.6em;
  font-weight: 700;
  color: #1a73e8;
  margin-bottom: 8px;
}
.disease-card .disease-info {
  font-size: 0.9em;
  color: #5f6368;
}
.disease-card .hint-text {
  font-size: 0.85em;
  color: #e37400;
  margin-top: 6px;
}
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
/* PPE Grid - Mode 1 */
.ppe-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 10px;
  margin-bottom: 20px;
}
.ppe-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 14px 8px;
  border: 2px solid #dadce0;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.2s;
  background: #fafafa;
  user-select: none;
}
.ppe-item:hover { border-color: #1a73e8; background: #e8f0fe; }
.ppe-item.selected {
  border-color: #1a73e8;
  background: #d2e3fc;
  box-shadow: 0 0 0 3px rgba(26,115,232,0.2);
  transform: scale(1.03);
}
.ppe-item.correct {
  border-color: #0d904f;
  background: #ceead6;
  box-shadow: 0 0 0 3px rgba(13,144,79,0.2);
}
.ppe-item.wrong {
  border-color: #d93025;
  background: #fce8e6;
  box-shadow: 0 0 0 3px rgba(217,48,37,0.2);
  animation: shake 0.5s ease;
}
.ppe-item.missed {
  border-color: #f9ab00;
  background: #fef7e0;
  box-shadow: 0 0 0 3px rgba(249,171,0,0.2);
}
.ppe-item .ppe-icon { font-size: 2em; }
.ppe-item .ppe-name { font-size: 0.8em; font-weight: 600; text-align: center; line-height: 1.2; }
.ppe-item .ppe-tag { font-size: 0.75em; color: #5f6368; }
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-6px); }
  40% { transform: translateX(6px); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(4px); }
}
/* Mode 2 - Classification */
.classify-area {
  display: flex;
  gap: 16px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.current-disease-area {
  flex: 0 0 100%;
  margin-bottom: 8px;
}
.category-buckets {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  width: 100%;
}
@media (max-width: 700px) {
  .category-buckets { grid-template-columns: repeat(2, 1fr); }
}
.category-bucket {
  border: 2px dashed #dadce0;
  border-radius: 12px;
  padding: 16px 10px;
  text-align: center;
  cursor: pointer;
  transition: all 0.25s;
  min-height: 80px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
}
.category-bucket:hover {
  border-color: #1a73e8;
  background: #e8f0fe;
  transform: translateY(-2px);
}
.category-bucket .bucket-icon { font-size: 1.8em; }
.category-bucket .bucket-name { font-size: 0.85em; font-weight: 600; }
.category-bucket .bucket-count { font-size: 0.75em; color: #5f6368; }
.category-bucket.correct-flash {
  border-color: #0d904f;
  background: #ceead6;
  animation: popIn 0.4s ease;
}
.category-bucket.wrong-flash {
  border-color: #d93025;
  background: #fce8e6;
  animation: shake 0.5s ease;
}
@keyframes popIn {
  0% { transform: scale(1); }
  50% { transform: scale(1.08); }
  100% { transform: scale(1); }
}
/* Mode 3 - Quiz */
.quiz-question {
  font-size: 1.15em;
  font-weight: 600;
  text-align: center;
  margin-bottom: 20px;
  padding: 16px;
  background: #f8f9fa;
  border-radius: 12px;
  line-height: 1.6;
}
.options-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 20px;
}
.option-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  border: 2px solid #dadce0;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.2s;
  font-size: 0.95em;
}
.option-item:hover { border-color: #1a73e8; background: #e8f0fe; }
.option-item.selected-option {
  border-color: #1a73e8;
  background: #d2e3fc;
}
.option-item.correct-answer {
  border-color: #0d904f;
  background: #ceead6;
}
.option-item.wrong-answer {
  border-color: #d93025;
  background: #fce8e6;
  animation: shake 0.5s ease;
}
.option-letter {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: #e8f0fe;
  color: #1a73e8;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  flex-shrink: 0;
}
.option-item.selected-option .option-letter { background: #1a73e8; color: #fff; }
.option-item.correct-answer .option-letter { background: #0d904f; color: #fff; }
.option-item.wrong-answer .option-letter { background: #d93025; color: #fff; }
/* Question Type Badge */
.question-type {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 0.8em;
  font-weight: 600;
  margin-bottom: 12px;
}
.qtype-single { background: #e8f0fe; color: #1a73e8; }
.qtype-truefalse { background: #fef7e0; color: #e37400; }
.qtype-multi { background: #ceead6; color: #0d904f; }
/* Result Screen */
.result-screen {
  text-align: center;
  padding: 30px 20px;
  animation: fadeInUp 0.5s ease;
}
.result-score {
  font-size: 4em;
  font-weight: 800;
  background: linear-gradient(135deg, #1a73e8, #0d47a1);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.result-stats {
  display: flex;
  justify-content: center;
  gap: 30px;
  flex-wrap: wrap;
  margin: 20px 0;
}
.result-stat {
  text-align: center;
}
.result-stat .stat-val { font-size: 1.8em; font-weight: 700; color: #1a73e8; }
.result-stat .stat-label { font-size: 0.85em; color: #5f6368; }
.result-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 20px; }
/* Wrong Questions Review */
.wrong-list {
  max-height: 400px;
  overflow-y: auto;
  margin-top: 16px;
}
.wrong-item {
  background: #fef7e0;
  border-left: 4px solid #f9ab00;
  padding: 12px 16px;
  margin-bottom: 8px;
  border-radius: 0 8px 8px 0;
  font-size: 0.9em;
  line-height: 1.5;
}
.wrong-item .correct-ans { color: #0d904f; font-weight: 600; }
/* Stats Panel */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}
.stat-card {
  background: #f8f9fa;
  border-radius: 12px;
  padding: 16px;
  text-align: center;
}
.stat-card .stat-num { font-size: 2em; font-weight: 700; color: #1a73e8; }
.stat-card .stat-title { font-size: 0.85em; color: #5f6368; margin-top: 4px; }
/* Knowledge Table */
.knowledge-table-wrap { overflow-x: auto; margin-top: 16px; }
.knowledge-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.85em;
}
.knowledge-table th {
  background: #1a73e8;
  color: #fff;
  padding: 10px 8px;
  text-align: left;
  white-space: nowrap;
  position: sticky;
  top: 0;
}
.knowledge-table td {
  padding: 8px;
  border-bottom: 1px solid #dadce0;
  vertical-align: top;
  line-height: 1.4;
}
.knowledge-table tr:hover td { background: #e8f0fe; }
.knowledge-table tr:nth-child(even) td { background: #fafafa; }
.knowledge-table tr:nth-child(even):hover td { background: #e8f0fe; }
/* Feedback Toast */
.toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  padding: 12px 24px;
  border-radius: 10px;
  font-weight: 600;
  color: #fff;
  z-index: 1000;
  animation: toastIn 0.3s ease, toastOut 0.3s ease 1.5s forwards;
  pointer-events: none;
}
.toast-success { background: #0d904f; }
.toast-error { background: #d93025; }
.toast-info { background: #1a73e8; }
@keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(-20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
@keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }
/* Progress Bar */
.progress-bar-wrap {
  background: #e8e8e8;
  border-radius: 10px;
  height: 8px;
  margin-bottom: 16px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, #1a73e8, #0d904f);
  border-radius: 10px;
  transition: width 0.3s ease;
}
/* Timer Bar */
.timer-bar-wrap {
  background: #e8e8e8;
  border-radius: 10px;
  height: 6px;
  margin-bottom: 16px;
  overflow: hidden;
}
.timer-bar-fill {
  height: 100%;
  background: #0d904f;
  border-radius: 10px;
  transition: width 0.1s linear;
}
.timer-bar-fill.warning { background: #f9ab00; }
.timer-bar-fill.danger { background: #d93025; }
/* Start Screen */
.start-screen {
  text-align: center;
  padding: 30px 20px;
  animation: fadeInUp 0.5s ease;
}
.start-icon { font-size: 4em; margin-bottom: 16px; }
.start-title { font-size: 1.5em; font-weight: 700; margin-bottom: 8px; }
.start-desc { color: #5f6368; margin-bottom: 20px; line-height: 1.6; }
/* Combo Animation */
.combo-pop {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 2em;
  font-weight: 800;
  color: #e37400;
  pointer-events: none;
  z-index: 999;
  animation: comboUp 1s ease forwards;
}
@keyframes comboUp {
  0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  100% { opacity: 0; transform: translate(-50%, -80%) scale(1.5); }
}
/* Empty state */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: #5f6368;
}
.empty-state .empty-icon { font-size: 3em; margin-bottom: 12px; }
.hidden { display: none !important; }
/* Timer Toggle */
.timer-toggle {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 6px 14px;
  border: 2px solid #dadce0;
  border-radius: 20px;
  cursor: pointer;
  font-size: 0.82em;
  font-weight: 600;
  background: #f8f9fa;
  color: #5f6368;
  transition: all 0.25s;
}
.timer-toggle:hover { border-color: #e37400; color: #e37400; background: #fef7e0; }
body.dark .timer-toggle { background: #1e1e32; border-color: #333; color: #999; }
body.dark .timer-toggle:hover { border-color: #f0a040; color: #f0a040; background: #2d2a18; }
/* Dark Mode Toggle */
.dark-toggle {
  position: fixed;
  top: 16px;
  right: 16px;
  width: 42px;
  height: 42px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.5);
  background: rgba(255,255,255,0.15);
  color: #fff;
  font-size: 1.2em;
  cursor: pointer;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s;
  backdrop-filter: blur(8px);
}
.dark-toggle:hover { background: rgba(255,255,255,0.25); border-color: #fff; transform: scale(1.08); }
/* Dark Mode Overrides */
body.dark {
  background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #0f0f1a 100%);
  color: #e0e0e0;
}
body.dark .header { background: linear-gradient(135deg, #2d5aa0, #143066); box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
body.dark .tabs,
body.dark .status-bar,
body.dark .main-content { background: #1e1e32; color: #e0e0e0; box-shadow: 0 2px 12px rgba(0,0,0,0.4); }
body.dark .tab-btn { color: #999; }
body.dark .tab-btn:hover { background: #2a2a40; color: #8ab4f8; }
body.dark .tab-btn.active { background: linear-gradient(135deg, #2d5aa0, #1a3a6e); }
body.dark .disease-card { background: linear-gradient(135deg, #1e1e32, #2a2a40); border-color: #4a6fa5; }
body.dark .disease-card .disease-name { color: #8ab4f8; }
body.dark .disease-card .disease-info { color: #999; }
body.dark .disease-card .hint-text { color: #f0a040; }
body.dark .ppe-item { background: #1e1e32; border-color: #333; }
body.dark .ppe-item:hover { border-color: #4a6fa5; background: #2a2a40; }
body.dark .ppe-item.selected { border-color: #4a6fa5; background: #1a3050; }
body.dark .section-title { color: #8ab4f8; }
body.dark .section-desc { color: #999; }
body.dark .category-bucket { border-color: #333; }
body.dark .category-bucket:hover { border-color: #4a6fa5; background: #2a2a40; }
body.dark .quiz-question { background: #1e1e32; }
body.dark .option-item { border-color: #333; }
body.dark .option-item:hover { border-color: #4a6fa5; background: #2a2a40; }
body.dark .option-letter { background: #2a2a40; color: #8ab4f8; }
body.dark .option-item.selected-option { background: #1a3050; border-color: #4a6fa5; }
body.dark .option-item.selected-option .option-letter { background: #2d5aa0; color: #fff; }
body.dark .stat-card { background: #1e1e32; }
body.dark .stat-card .stat-num { color: #8ab4f8; }
body.dark .stat-card .stat-title { color: #999; }
body.dark .knowledge-table th { background: #2d5aa0; }
body.dark .knowledge-table td { border-color: #333; }
body.dark .knowledge-table tr:nth-child(even) td { background: #1a1a2c; }
body.dark .knowledge-table tr:hover td { background: #2a2a40; }
body.dark .knowledge-table tr:nth-child(even):hover td { background: #2a2a40; }
body.dark .wrong-item { background: #2d2a18; }
body.dark .btn-outline { background: #1e1e32; color: #8ab4f8; border-color: #4a6fa5; }
body.dark .btn-outline:hover { background: #2a2a40; }
body.dark .empty-state { color: #999; }
body.dark .empty-state .empty-icon { opacity: 0.6; }
body.dark .progress-bar-wrap,
body.dark .timer-bar-wrap { background: #333; }
body.dark .result-score {
  background: linear-gradient(135deg, #8ab4f8, #5a8fd0);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
body.dark .dark-toggle { border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.08); }
body.dark .dark-toggle:hover { background: rgba(255,255,255,0.18); }
body.dark #searchRef { background: #1e1e32; color: #e0e0e0; border-color: #333; }
body.dark .result-stat .stat-val { color: #8ab4f8; }
body.dark .result-stat .stat-label { color: #999; }
body.dark .status-item { color: #ccc; }
/* Disease Stats Table in Dark */
body.dark .disease-stat-row:hover { background: #2a2a40; }
body.dark .mini-bar-bg { background: #333; }
body.dark .retry-box { background: linear-gradient(135deg, #2d2a18, #2d1a1a) !important; border-color: #8a6d00 !important; }
body.dark .retry-box .retry-desc { color: #999; }
</style>
</head>
<body>
<div class="container">
  <!-- Dark Mode Toggle -->
  <button class="dark-toggle" id="darkToggle" onclick="toggleDarkMode()" aria-label="切换暗色模式">🌙</button>

  <!-- Header -->
  <div class="header">
    <h1>🏥 传染病防护知识培训游戏</h1>
    <div class="subtitle">基于《常见传染病和感染性疾病的防护要求》· 23种传染病 · 3种训练模式</div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="mode1" onclick="switchTab('mode1')">🛡️ 防护装备选择</button>
    <button class="tab-btn" data-tab="mode2" onclick="switchTab('mode2')">🦠 传播途径分类</button>
    <button class="tab-btn" data-tab="mode3" onclick="switchTab('mode3')">⚡ 快问快答</button>
    <button class="tab-btn" data-tab="stats" onclick="switchTab('stats')">📊 学习统计</button>
    <button class="tab-btn" data-tab="reference" onclick="switchTab('reference')">📖 知识速查</button>
  </div>

  <!-- Status Bar -->
  <div class="status-bar">
    <div class="status-item"><span class="icon">⭐</span> 得分：<span class="score-val" id="globalScore">0</span></div>

// Persisted stats
function loadStats() {
  try {
    const d = JSON.parse(localStorage.getItem('infection_game_stats') || '{}');
    return {
      totalScore: d.totalScore || 0,
      totalAnswered: d.totalAnswered || 0,
      correctAnswered: d.correctAnswered || 0,
      maxCombo: d.maxCombo || 0,
      wrongBook: d.wrongBook || [],
    };
  } catch { return { totalScore: 0, totalAnswered: 0, correctAnswered: 0, maxCombo: 0, wrongBook: [] }; }
}

function saveStats() {
  const s = loadStats();
  s.totalScore += state.score;
  s.totalAnswered += state.totalAnswered;
  s.correctAnswered += state.correctAnswered;
  s.maxCombo = Math.max(s.maxCombo, state.maxCombo);
  localStorage.setItem('infection_game_stats', JSON.stringify(s));
}

function addWrong(diseaseId, question, userAnswer, correctAnswer, mode) {
  const s = loadStats();
  s.wrongBook.push({
    diseaseId, question, userAnswer, correctAnswer, mode,
    time: new Date().toLocaleString('zh-CN'),
  });
  // Keep last 200
  if (s.wrongBook.length > 200) s.wrongBook = s.wrongBook.slice(-200);
  localStorage.setItem('infection_game_stats', JSON.stringify(s));
}

function recordDiseaseResult(diseaseId, isCorrect) {
  const s = loadStats();
  if (!s.diseaseStats) s.diseaseStats = {};
  if (!s.diseaseStats[diseaseId]) {
    const d = DISEASES.find(x => x.id === diseaseId);
    s.diseaseStats[diseaseId] = { name: d ? d.name : '未知', correct: 0, wrong: 0 };
  }
  if (isCorrect) s.diseaseStats[diseaseId].correct++;
  else s.diseaseStats[diseaseId].wrong++;
  localStorage.setItem('infection_game_stats', JSON.stringify(s));
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function showToast(msg, type) {
  const container = document.getElementById('toastContainer');
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(() => el.remove(), 2000);
}

function showComboPop(combo) {
  if (combo < 3) return;
  const el = document.createElement('div');
  el.className = 'combo-pop';
  el.textContent = `🔥 ${combo}连击！`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1000);
}

function updateStatusBar() {
  document.getElementById('globalScore').textContent = state.score;
  document.getElementById('globalCombo').textContent = state.combo;
  document.getElementById('globalTotal').textContent = state.totalAnswered;
  const acc = state.totalAnswered > 0 ? Math.round(state.correctAnswered / state.totalAnswered * 100) + '%' : '-';
  document.getElementById('globalAccuracy').textContent = acc;
}

  state.totalAnswered = 0;
  state.correctAnswered = 0;
  if (mode === 'mode1') {
    state.mode1 = { currentIndex: 0, diseases: shuffle(DISEASES).slice(0, 5), selected: new Set(), answered: false, round: 0, roundTotal: 5 };
  } else if (mode === 'mode2') {
    if (state.mode2.timer) clearInterval(state.mode2.timer);
    const timerPref = localStorage.getItem('infection_game_timer') === '1';
    state.mode2 = { currentIndex: 0, diseases: shuffle(DISEASES).slice(0, 10), answered: false, round: 0, roundTotal: 10, timer: null, timeLeft: 8, timerEnabled: timerPref };
  } else if (mode === 'mode3') {
    if (state.mode3.timer) clearInterval(state.mode3.timer);
    const timerPref = localStorage.getItem('infection_game_timer') === '1';
    state.mode3 = { currentIndex: 0, questions: [], answered: false, round: 0, roundTotal: 10, timer: null, timeLeft: 10, timerEnabled: timerPref };

  updateStatusBar();
}

// ============================================================
// MODE 1: PPE SELECTION CHALLENGE
// ============================================================
function renderMode1() {
  const m = state.mode1;
  const container = document.getElementById('mainContent');

  if (m.currentIndex >= m.roundTotal) {
    renderMode1Result(container);
    return;
  }

  const disease = m.diseases[m.currentIndex];
  const progress = Math.round(m.currentIndex / m.roundTotal * 100);
  const hint = disease.transmission.includes('空气') ? '💡 提示：该疾病可通过空气传播，注意防护等级！' :
               disease.transmission.includes('飞沫') ? '💡 提示：该疾病可通过飞沫传播' :
               disease.transmission.includes('接触') ? '💡 提示：该疾病可通过接触传播' : '';

  container.innerHTML = `
    <div class="section-title">🛡️ 防护装备选择挑战</div>
    <div class="section-desc">根据疾病选择正确的防护装备组合（第${m.currentIndex + 1}/${m.roundTotal}题）</div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${progress}%"></div></div>
    <div class="disease-card">
      <div class="disease-name">${disease.name}</div>
      <div class="disease-info">传播途径：${disease.transmission}</div>
      <div class="disease-info">隔离方式：${disease.isolation}</div>
      ${hint ? `<div class="hint-text">${hint}</div>` : ''}
    </div>
    <div style="font-weight:600;margin-bottom:8px;color:#5f6368;">请选择<b>基本防护装备</b>（必选）+ <b>可选防护装备</b>（加分）：</div>
    <div class="ppe-grid" id="ppeGrid"></div>
    <div style="text-align:center;margin-top:16px;">
      <button class="btn btn-primary" id="submitPPE" ${m.answered ? 'disabled' : ''}>✅ 提交答案</button>
      ${m.answered ? `<button class="btn btn-outline" id="nextPPE">下一题 ➡️</button>` : ''}
    </div>
    ${m.answered ? `<div id="feedbackArea" style="margin-top:16px;text-align:center;font-weight:600;"></div>` : ''}
  `;

  // Render PPE grid
  const grid = document.getElementById('ppeGrid');
  PPE_DISPLAY.forEach(ppe => {
    const div = document.createElement('div');
    div.className = 'ppe-item';
    div.dataset.ppeId = ppe.id;
    if (m.selected.has(ppe.id)) div.classList.add('selected');
    if (m.answered) {
      const isBasic = disease.basic.includes(ppe.id);
      const isOptional = disease.optional.includes(ppe.id);
      const wasSelected = m.selected.has(ppe.id);
      if (isBasic && wasSelected) div.classList.add('correct');
      else if (isOptional && wasSelected) div.classList.add('correct');
      else if (wasSelected && !isBasic && !isOptional) div.classList.add('wrong');
      else if (isBasic && !wasSelected) div.classList.add('missed');
    }
    div.innerHTML = `<span class="ppe-icon">${ppe.icon}</span><span class="ppe-name">${ppe.name}</span>`;
    if (!m.answered) {
      div.addEventListener('click', () => {
        if (m.selected.has(ppe.id)) m.selected.delete(ppe.id);
        else m.selected.add(ppe.id);
        div.classList.toggle('selected');
      });
    }
    grid.appendChild(div);
  });

  // Submit button
  if (!m.answered) {
    document.getElementById('submitPPE').addEventListener('click', () => submitMode1(disease));
  } else {
    const fb = document.getElementById('feedbackArea');
    const allCorrect = disease.basic.every(b => m.selected.has(b)) && disease.optional.every(o => m.selected.has(o)) && [...m.selected].every(s => disease.basic.includes(s) || disease.optional.includes(s));
    fb.innerHTML = allCorrect
      ? '<span style="color:#0d904f;">🎉 太棒了！完全正确！</span>'

    document.getElementById('nextPPE').addEventListener('click', () => {
      m.currentIndex++;
      m.selected = new Set();
      m.answered = false;
      renderMode1();
    });
  }

  updateStatusBar();
}

function submitMode1(disease) {
  const m = state.mode1;
  m.answered = true;
  const selected = [...m.selected];
  const correctBasic = disease.basic.every(b => selected.includes(b));
  const extraItems = selected.filter(s => !disease.basic.includes(s) && !disease.optional.includes(s));
  const missedBasic = disease.basic.filter(b => !selected.includes(b));
  const correctOptional = disease.optional.filter(o => selected.includes(o));

  let points = 0;
  if (correctBasic && extraItems.length === 0) {
    points += 60;
    points += correctOptional.length * (40 / Math.max(1, disease.optional.length));
  } else if (correctBasic && extraItems.length > 0) {
    points += 30;
    points -= extraItems.length * 20;
  } else {
    points -= missedBasic.length * 20;
    points -= extraItems.length * 20;
  }
  points = Math.round(points);

  if (points > 0) {
    state.combo++;
    state.correctAnswered++;
    if (state.combo > state.maxCombo) state.maxCombo = state.combo;
    showToast(`✅ 正确！+${points}分`, 'success');
    showComboPop(state.combo);
  } else {
    state.combo = 0;
    showToast(`❌ 继续加油！${points}分`, 'error');

function generateQuestions() {
  const questions = [];

  DISEASES.forEach(d => {
    // Type 1: Single choice - transmission route
    const wrongTransmissions = DISEASES.filter(x => x.id !== d.id && x.transmission !== d.transmission).slice(0, 3);
    if (wrongTransmissions.length >= 2) {
      const options = shuffle([d.transmission, ...wrongTransmissions.slice(0, 3).map(x => x.transmission)].filter((v, i, a) => a.indexOf(v) === i));
      if (options.length >= 3) {
        questions.push({
          type: 'single',
          diseaseId: d.id,
          question: `「${d.name}」的主要传播途径是什么？`,
          options: options.slice(0, 4),
          answer: d.transmission,
        });
      }
    }

    // Type 2: Single choice - isolation method
    const wrongIsolations = DISEASES.filter(x => x.id !== d.id && x.isolation !== d.isolation).slice(0, 3);
    if (wrongIsolations.length >= 2) {
      const options = shuffle([d.isolation, ...wrongIsolations.slice(0, 3).map(x => x.isolation)].filter((v, i, a) => a.indexOf(v) === i));
      if (options.length >= 3) {
        questions.push({
          type: 'single',
          diseaseId: d.id,
          question: `「${d.name}」的隔离方式是什么？`,
          options: options.slice(0, 4),
          answer: d.isolation,
        });
      }
    }

    // Type 3: True/False
    if (d.basic.length > 0) {
      const correctPPE = d.basic[Math.floor(Math.random() * d.basic.length)];
      const isTrue = Math.random() > 0.5;
      const randomWrong = PPE_DISPLAY.find(p => !d.basic.includes(p.id) && !d.optional.includes(p.id));
      questions.push({
        type: 'truefalse',
        diseaseId: d.id,
        question: isTrue
          ? `「${d.name}」的基本防护是否需要配备「${correctPPE}」？`
          : (randomWrong ? `「${d.name}」的基本防护是否需要配备「${randomWrong.name}」？` : `「${d.name}」只需要隔离衣即可？`),
        options: ['✅ 正确', '❌ 错误'],
        answer: isTrue ? '✅ 正确' : '❌ 错误',
      });
    }

    // Type 4: Multi-select - basic protection (only for simple ones)
    if (d.basic.length >= 2 && d.basic.length <= 5) {
      const distractors = PPE_DISPLAY.filter(p => !d.basic.includes(p.id)).slice(0, 3).map(p => p.name);
      const allOpts = shuffle([...d.basic, ...distractors]).slice(0, 6);
      questions.push({
        type: 'multi',
        diseaseId: d.id,
        question: `「${d.name}」的基本防护要求包括哪些？（多选）`,
        options: allOpts,
        answer: d.basic,
      });
    }
  });

  return shuffle(questions).slice(0, 10);
}

function submitMode3(q, userAnswer) {
  const m = state.mode3;
  if (m.answered) return;
  m.answered = true;
  if (m.timer) { clearInterval(m.timer); m.timer = null; }

  let isCorrect;
  if (q.type === 'multi') {
    const correct = q.answer;
    isCorrect = userAnswer && correct.length === userAnswer.length && correct.every(c => userAnswer.includes(c));
  } else {
    isCorrect = userAnswer && userAnswer[0] === q.answer;
  }

  m._userAnswer = userAnswer || [];

  if (isCorrect) {
    state.combo++;
    state.correctAnswered++;
    if (state.combo > state.maxCombo) state.maxCombo = state.combo;
    const bonus = Math.min(state.combo - 1, 5) * 5;
    state.score += 30 + bonus;
    showToast(`✅ 正确！+${30 + bonus}`, 'success');
    showComboPop(state.combo);

    state.combo = 0;
    const userStr = userAnswer?.join('、') || '⏰ 超时未选';
    const correctStr = Array.isArray(q.answer) ? q.answer.join('、') : q.answer;
    showToast(`❌ 正确答案：${correctStr}`, 'error');
    addWrong(q.diseaseId, q.question, userStr, correctStr, 'mode3');

  state.totalAnswered++;
  recordDiseaseResult(q.diseaseId, isCorrect);
  saveStats();
  renderMode3();
}

        </table>
      </div>
    ` : '<div class="empty-state"><div style="font-size:1.5em;">📝</div><div>完成答题后这里会显示每个疾病的掌握情况</div></div>'}

    <!-- Wrong Book -->
    <div class="section-title" style="font-size:1.1em;margin-top:20px;">📝 错题本</div>
    ${s.wrongBook.length === 0 ? '<div class="empty-state"><div class="empty-icon">🎉</div><div>还没有错题，继续保持！</div></div>' : `
      <div class="wrong-list">
        ${s.wrongBook.slice().reverse().slice(0, 50).map((w, i) => `
          <div class="wrong-item">
            <strong>#${s.wrongBook.length - i}</strong> [${w.mode === 'mode1' ? '防护选择' : w.mode === 'mode2' ? '分类挑战' : '快问快答'}] ${w.time}<br>
            <strong>问题：</strong>${w.question}<br>
            <strong>你的回答：</strong><span style="color:#d93025;">${w.userAnswer}</span><br>
            <strong>正确答案：</strong><span class="correct-ans">${w.correctAnswer}</span>
          </div>
        `).join('')}
      </div>
    `}

    <!-- Data Management -->
    <div class="section-title" style="font-size:1em;margin-top:20px;">💾 数据管理</div>
    <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:12px;">
      <button class="btn btn-primary" onclick="exportStats()" style="font-size:0.85em;">📥 导出学习数据</button>
      <button class="btn btn-outline" onclick="document.getElementById('importFile').click()" style="font-size:0.85em;">📤 导入学习数据</button>
      <button class="btn btn-danger" onclick="clearStats()" style="font-size:0.85em;">🗑️ 清除学习记录</button>
    </div>
    <input type="file" id="importFile" accept=".json" style="display:none;" onchange="importStats(event)">
  `;
  updateStatusBar();
}

function clearStats() {
  if (confirm('确定要清除所有学习记录和错题本吗？此操作不可撤销！')) {
    localStorage.removeItem('infection_game_stats');
    showToast('已清除所有学习记录', 'info');
    renderStats();
  }
}

// ============================================================
// RETRY PRACTICE (错题重练)
// ============================================================
function startRetryPractice(mode) {
  const s = loadStats();
  const wrongDiseaseIds = [...new Set(s.wrongBook.map(w => w.diseaseId).filter(Boolean))];
  const wrongDiseases = wrongDiseaseIds.map(id => DISEASES.find(d => d.id === id)).filter(Boolean);

  if (wrongDiseases.length === 0) {
    showToast('没有错题可以练习！', 'info');
    return;
  }

  // Reset the chosen mode with wrong diseases
  resetRoundState(mode);
  if (mode === 'mode1') {
    state.mode1.diseases = shuffle(wrongDiseases).slice(0, Math.min(5, wrongDiseases.length));
    state.mode1.roundTotal = state.mode1.diseases.length;
  } else if (mode === 'mode2') {
    state.mode2.diseases = shuffle(wrongDiseases).slice(0, Math.min(10, wrongDiseases.length));
    state.mode2.roundTotal = state.mode2.diseases.length;
  }

  // Switch to that tab
  state.currentTab = mode;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === mode));
  updateStatusBar();
  renderTab(mode);
  showToast(`🎯 开始错题重练！共 ${mode === 'mode1' ? state.mode1.roundTotal : state.mode2.roundTotal} 题`, 'info');
}

// ============================================================
// EXPORT / IMPORT
// ============================================================
function exportStats() {
  const s = loadStats();
  const data = JSON.stringify(s, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `infection-game-stats-${new Date().toISOString().slice(0, 10)}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('✅ 学习数据已导出！', 'success');
}

function importStats(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      // Validate structure
      if (typeof data.totalScore !== 'number' || typeof data.totalAnswered !== 'number') {
        throw new Error('数据格式不正确');
      }
      // Confirm before overwriting
      if (confirm(`即将导入数据：\n- 累计总分：${data.totalScore}\n- 累计答题：${data.totalAnswered}\n- 错题数：${(data.wrongBook || []).length}\n\n确定要覆盖当前数据吗？`)) {
        localStorage.setItem('infection_game_stats', JSON.stringify(data));
        showToast('✅ 学习数据已导入！', 'success');
        renderStats();
      }
    } catch (err) {
      showToast('❌ 文件格式不正确，请选择有效的导出文件', 'error');
    }
  };
  reader.readAsText(file);
  // Reset input so the same file can be re-imported
  event.target.value = '';
}

// ============================================================
// KNOWLEDGE REFERENCE
// ============================================================
function renderReference() {
  const container = document.getElementById('mainContent');
  container.innerHTML = `
    <div class="section-title">📖 知识速查表</div>
    <div class="section-desc">23种常见传染病的防护要求速查（源自培训教材）</div>
    <div style="margin-bottom:12px;">
      <input type="text" id="searchRef" placeholder="🔍 搜索疾病名称..." style="width:100%;padding:10px 14px;border:2px solid #dadce0;border-radius:10px;font-size:0.95em;" oninput="filterReference()">
    </div>
    <div class="knowledge-table-wrap">
      <table class="knowledge-table" id="refTable">
        <thead>
          <tr>
            <th>疾病名称</th>
            <th>传播途径</th>
            <th>隔离方式</th>
            <th>基本防护要求</th>
            <th>可选防护用品</th>
          </tr>
        </thead>
        <tbody>
          ${DISEASES.map(d => `
            <tr data-search="${d.name}">
              <td><strong>${d.name}</strong></td>
              <td>${d.transmission}</td>
              <td>${d.isolation}</td>
              <td>${d.basic.length > 0 ? d.basic.map(p => `<span style="background:#ceead6;padding:2px 6px;border-radius:4px;margin:1px;display:inline-block;font-size:0.8em;">${p}</span>`).join(' ') : '<span style="color:#999;">—</span>'}</td>
              <td>${d.optional.length > 0 ? d.optional.map(p => `<span style="background:#fef7e0;padding:2px 6px;border-radius:4px;margin:1px;display:inline-block;font-size:0.8em;">${p}</span>`).join(' ') : '<span style="color:#999;">—</span>'}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
  updateStatusBar();
}

function filterReference() {
  const query = document.getElementById('searchRef')?.value?.toLowerCase() || '';
  document.querySelectorAll('#refTable tbody tr').forEach(tr => {
    const text = tr.dataset.search?.toLowerCase() || '';
    tr.style.display = text.includes(query) ? '' : 'none';
  });
}

// ============================================================
// DARK MODE
// ============================================================
function toggleDarkMode() {
  const body = document.body;
  body.classList.toggle('dark');
  const isDark = body.classList.contains('dark');
  document.getElementById('darkToggle').textContent = isDark ? '☀️' : '🌙';
  localStorage.setItem('infection_game_dark', isDark ? '1' : '0');
}

function initDarkMode() {
  const saved = localStorage.getItem('infection_game_dark');
  if (saved === '1') {
    document.body.classList.add('dark');
    document.getElementById('darkToggle').textContent = '☀️';
  }
}

// ============================================================
// INIT
// ============================================================
function init() {
  initDarkMode();
  state.currentTab = 'mode1';
  state.score = 0;
  state.combo = 0;
  state.totalAnswered = 0;
  state.correctAnswered = 0;
  state.mode1.diseases = shuffle(DISEASES).slice(0, 5);
  state.mode2.diseases = shuffle(DISEASES).slice(0, 10);
  state.mode3.questions = generateQuestions();
  // Restore timer preference
  const timerPref = localStorage.getItem('infection_game_timer') === '1';
  state.mode2.timerEnabled = timerPref;
  state.mode3.timerEnabled = timerPref;
  updateStatusBar();
  renderTab('mode1');
}

// Run on load
document.addEventListener('DOMContentLoaded', init);
</script>
